<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HeatSeek - Real-time Coverage Dashboard</title>
    <script src="https://cdn.plot.ly/plotly-2.26.0.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #f5f7fa;
            color: #2c3e50;
            padding: 20px;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 30px;
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        h1 {
            font-size: 28px;
            margin-bottom: 10px;
            color: #2E7D32;
        }

        .subtitle {
            color: #7f8c8d;
            font-size: 14px;
        }

        .summary {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .metric {
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            padding: 20px;
            border-radius: 6px;
            border-left: 4px solid #2E7D32;
        }

        .metric-value {
            font-size: 36px;
            font-weight: bold;
            color: #2E7D32;
            margin-bottom: 5px;
        }

        .metric-label {
            font-size: 13px;
            color: #6c757d;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .filters {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
            padding: 20px;
            background: white;
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .filter-label {
            font-size: 12px;
            color: #6c757d;
            font-weight: 500;
        }

        select, input[type="number"] {
            padding: 8px 12px;
            border: 1px solid #dee2e6;
            border-radius: 4px;
            font-size: 14px;
            background: white;
            min-width: 150px;
        }

        select:focus, input[type="number"]:focus {
            outline: 2px solid #2E7D32;
            outline-offset: 2px;
            border-color: #2E7D32;
        }

        .refresh-btn {
            background: #2E7D32;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: background 0.2s;
            margin-top: auto;
        }

        .refresh-btn:hover {
            background: #1B5E20;
        }

        .refresh-btn:focus {
            outline: 2px solid #1B5E20;
            outline-offset: 2px;
        }

        .refresh-btn:active {
            transform: scale(0.98);
        }

        .refresh-btn:disabled {
            background: #95a5a6;
            cursor: not-allowed;
        }

        .last-update {
            margin-left: auto;
            color: #6c757d;
            font-size: 13px;
            margin-top: auto;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .tab {
            padding: 12px 24px;
            background: white;
            border: 2px solid #dee2e6;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .tab:hover {
            border-color: #2E7D32;
        }

        .tab:focus {
            outline: 2px solid #2E7D32;
            outline-offset: 2px;
        }

        .tab.active {
            background: #2E7D32;
            color: white;
            border-color: #2E7D32;
        }

        .platform-summary {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            margin-bottom: 20px;
        }

        .platform-summary .summary {
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        }

        .platform-summary .metric {
            border-left-color: #1976D2;
        }

        .platform-summary .metric-value {
            color: #1976D2;
            font-size: 32px;
        }

        #heatmap {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #6c757d;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #2E7D32;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .legend {
            display: flex;
            gap: 20px;
            justify-content: center;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 6px;
            margin-top: 15px;
            font-size: 12px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .legend-color {
            width: 20px;
            height: 20px;
            border-radius: 3px;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            border-left: 4px solid #dc3545;
        }

        .filter-status-container {
            background: white;
            padding: 12px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .filter-status {
            font-size: 13px;
            color: #6c757d;
            font-style: italic;
        }

        .executive-summary {
            background: white;
            padding: 25px;
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .summary-header {
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #2E7D32;
        }

        .summary-header h2 {
            font-size: 20px;
            font-weight: bold;
            color: #333;
            margin: 0;
        }

        .insight-section {
            margin-bottom: 20px;
        }

        .insight-section:last-child {
            margin-bottom: 0;
        }

        .insight-section h3 {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 10px;
            color: #2c3e50;
        }

        .insight-item {
            padding: 10px 15px;
            background: #f9f9f9;
            border-radius: 4px;
            margin-bottom: 8px;
        }

        .insight-item:last-child {
            margin-bottom: 0;
        }

        .critical-gap {
            border-left: 4px solid #dc3545;
        }

        .recommendation {
            border-left: 4px solid #1976D2;
            padding: 12px 15px;
        }

        .no-issues {
            color: #2E7D32;
            font-style: italic;
            padding: 10px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>HeatSeek Coverage Dashboard</h1>
            <p class="subtitle">Real-time RHEL performance test coverage analysis</p>
            <div class="summary" id="summary">
                <div class="loading">
                    <div class="spinner"></div>
                    Loading summary...
                </div>
            </div>
        </div>

        <div class="executive-summary">
            <div class="summary-header">
                <h2>Executive Summary</h2>
            </div>
            <div id="summaryInsights">
                <div class="loading">
                    <div class="spinner"></div>
                    Loading insights...
                </div>
            </div>
        </div>

        <div class="filters">
            <div class="filter-group">
                <label class="filter-label" for="benchmarkFilter">Benchmark</label>
                <select id="benchmarkFilter">
                    <option value="">All Benchmarks</option>
                </select>
            </div>

            <div class="filter-group">
                <label class="filter-label" for="archFilter">Architecture</label>
                <select id="archFilter">
                    <option value="">All Architectures</option>
                    <option value="x86_64">x86_64</option>
                    <option value="aarch64">aarch64</option>
                </select>
            </div>

            <div class="filter-group">
                <label class="filter-label" for="minBuilds">Min OS Builds</label>
                <input type="number" id="minBuilds" min="0" max="10" value="0">
            </div>

            <button class="refresh-btn" id="refreshBtn" onclick="app.refresh()">
                Refresh Data
            </button>

            <span class="last-update" id="lastUpdate" aria-live="polite" aria-atomic="true">Loading...</span>
        </div>

        <div class="filter-status-container">
            <span class="filter-status" id="filterStatus">Loading...</span>
        </div>

        <div id="errorContainer"></div>

        <div class="tabs" id="platformTabs" role="tablist" aria-label="Platform selection"></div>

        <div class="platform-summary" id="platformSummary" role="tabpanel" style="display: none;">
            <div class="summary" style="margin: 0 0 20px 0;">
                <!-- Platform-specific stats will be inserted here -->
            </div>
        </div>

        <div id="heatmap" role="tabpanel">
            <div class="loading">
                <div class="spinner"></div>
                Loading coverage data...
            </div>
        </div>

        <div class="legend">
            <div class="legend-item">
                <div class="legend-color" style="background: #E0E0E0"></div>
                <span>No Data (0 builds)</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background: #FFF59D"></div>
                <span>Insufficient (1 build)</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background: #A5D6A7"></div>
                <span>Minimal (2 builds)</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background: #66BB6A"></div>
                <span>Good (3-4 builds)</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background: #2E7D32"></div>
                <span>Excellent (5+ builds)</span>
            </div>
        </div>
    </div>

    <script>
        class HeatSeekApp {
            constructor() {
                this.currentPlatform = null;
                this.data = {};
                this.filters = {};
            }

            async init() {
                try {
                    await this.loadBenchmarks();
                    await this.loadSummary();
                    await this.loadCoverage();
                    this.setupEventListeners();
                } catch (error) {
                    this.showError('Failed to initialize dashboard: ' + error.message);
                    // Clear all loading spinners on initialization failure
                    this.setLoadingMessage('summary', 'Failed to load summary');
                    this.setLoadingMessage('heatmap', 'Failed to load data. See error message above.');
                    document.getElementById('lastUpdate').textContent = 'Error loading data';
                    document.getElementById('filterStatus').textContent = 'Error loading data';
                }
            }

            showError(message) {
                const errorContainer = document.getElementById('errorContainer');
                errorContainer.textContent = ''; // Clear existing errors
                const errorDiv = document.createElement('div');
                errorDiv.className = 'error';
                errorDiv.textContent = message; // Safe: no HTML interpretation
                errorContainer.appendChild(errorDiv);
            }

            clearError() {
                document.getElementById('errorContainer').textContent = '';
            }

            async loadBenchmarks() {
                try {
                    const response = await fetch('/api/benchmarks');

                    if (!response.ok) {
                        console.error(`Failed to load benchmarks: HTTP ${response.status}`);
                        return;
                    }

                    const data = await response.json();
                    const select = document.getElementById('benchmarkFilter');

                    data.benchmarks.forEach(benchmark => {
                        const option = document.createElement('option');
                        option.value = benchmark;
                        option.textContent = benchmark;
                        select.appendChild(option);
                    });
                } catch (error) {
                    console.error('Failed to load benchmarks:', error);
                }
            }

            async loadSummary() {
                try {
                    const response = await fetch('/api/summary');

                    if (!response.ok) {
                        const text = await response.text();
                        throw new Error(`HTTP ${response.status}: ${text.substring(0, 200)}`);
                    }

                    const contentType = response.headers.get('content-type');
                    if (!contentType || !contentType.includes('application/json')) {
                        const text = await response.text();
                        throw new Error(`Expected JSON but got ${contentType}. Response: ${text.substring(0, 200)}`);
                    }

                    const summary = await response.json();

                    // Build summary metrics safely
                    const summaryContainer = document.getElementById('summary');
                    summaryContainer.textContent = ''; // Clear loading state

                    const metrics = [
                        { value: summary.coverage_score + '%', label: 'Coverage Score' },
                        { value: summary.viable_combinations, label: 'Viable for Regression' },
                        { value: summary.total_combinations, label: 'Total Combinations' },
                        { value: summary.critical_gaps.length, label: 'Critical Gaps' }
                    ];

                    metrics.forEach(({ value, label }) => {
                        const metricDiv = document.createElement('div');
                        metricDiv.className = 'metric';

                        const valueDiv = document.createElement('div');
                        valueDiv.className = 'metric-value';
                        valueDiv.textContent = value;

                        const labelDiv = document.createElement('div');
                        labelDiv.className = 'metric-label';
                        labelDiv.textContent = label;

                        metricDiv.appendChild(valueDiv);
                        metricDiv.appendChild(labelDiv);
                        summaryContainer.appendChild(metricDiv);
                    });

                    const updateTime = new Date(summary.generated_at);
                    document.getElementById('lastUpdate').textContent =
                        `Updated: ${updateTime.toLocaleTimeString()}`;

                    // Render executive summary insights
                    this.renderExecutiveSummary(summary);
                } catch (error) {
                    this.showError('Failed to load summary: ' + error.message);
                    // Clear loading spinner on error
                    this.setLoadingMessage('summary', 'Failed to load summary');
                    this.setLoadingMessage('summaryInsights', 'Failed to load insights');
                    document.getElementById('lastUpdate').textContent = 'Error loading data';
                }
            }

            async loadCoverage() {
                try {
                    this.clearError();
                    const params = new URLSearchParams(this.filters);
                    const response = await fetch(`/api/coverage?${params}`);

                    if (!response.ok) {
                        const text = await response.text();
                        throw new Error(`HTTP ${response.status}: ${text.substring(0, 200)}`);
                    }

                    const contentType = response.headers.get('content-type');
                    if (!contentType || !contentType.includes('application/json')) {
                        const text = await response.text();
                        throw new Error(`Expected JSON but got ${contentType}. Response: ${text.substring(0, 200)}`);
                    }

                    const data = await response.json();

                    this.data = data;

                    // Create platform tabs
                    const platforms = Object.keys(data).sort();
                    if (platforms.length === 0) {
                        this.setLoadingMessage('heatmap', 'No data matches current filters');
                        document.getElementById('platformTabs').textContent = '';
                        return;
                    }

                    const tabsContainer = document.getElementById('platformTabs');
                    tabsContainer.textContent = ''; // Clear existing tabs

                    platforms.forEach((platform, index) => {
                        const button = document.createElement('button');
                        button.className = 'tab';
                        button.setAttribute('role', 'tab');
                        button.setAttribute('aria-label', `${platform} platform`);
                        button.setAttribute('aria-controls', 'platformSummary heatmap');

                        const isActive = platform === this.currentPlatform;
                        if (isActive) {
                            button.classList.add('active');
                            button.setAttribute('aria-selected', 'true');
                            button.setAttribute('tabindex', '0');
                        } else {
                            button.setAttribute('aria-selected', 'false');
                            button.setAttribute('tabindex', '-1');
                        }
                        button.textContent = platform;

                        // Mouse click
                        button.onclick = () => this.showPlatform(platform);

                        // Keyboard navigation
                        button.addEventListener('keydown', (e) => {
                            if (e.key === 'Enter' || e.key === ' ') {
                                e.preventDefault();
                                this.showPlatform(platform);
                            } else if (e.key === 'ArrowRight') {
                                e.preventDefault();
                                const nextIndex = (index + 1) % platforms.length;
                                const nextTab = tabsContainer.children[nextIndex];
                                this.updateTabFocus(nextTab);
                                nextTab.focus();
                            } else if (e.key === 'ArrowLeft') {
                                e.preventDefault();
                                const prevIndex = (index - 1 + platforms.length) % platforms.length;
                                const prevTab = tabsContainer.children[prevIndex];
                                this.updateTabFocus(prevTab);
                                prevTab.focus();
                            }
                        });

                        tabsContainer.appendChild(button);
                    });

                    // Show first platform if none selected
                    if (!this.currentPlatform || !platforms.includes(this.currentPlatform)) {
                        this.showPlatform(platforms[0]);
                    } else {
                        this.showPlatform(this.currentPlatform);
                    }

                    // Update filter status with current data
                    this.updateFilterStatus();
                } catch (error) {
                    this.showError('Failed to load coverage data: ' + error.message);
                    // Clear loading spinner on error
                    this.setLoadingMessage('heatmap', 'Failed to load data. See error message above.');
                    document.getElementById('platformTabs').textContent = '';
                }
            }

            updateTabFocus(focusedTab) {
                // Roving tabindex: only the focused tab is in tab order
                document.querySelectorAll('.tab').forEach(tab => {
                    tab.setAttribute('tabindex', tab === focusedTab ? '0' : '-1');
                });
            }

            showPlatform(platform) {
                this.currentPlatform = platform;
                const cells = this.data[platform];

                if (!cells || cells.length === 0) {
                    this.setLoadingMessage('heatmap', 'No data for this platform');
                    document.getElementById('platformSummary').style.display = 'none';
                    return;
                }

                // Update active tab and ARIA states
                document.querySelectorAll('.tab').forEach(tab => {
                    const isActive = tab.textContent === platform;
                    tab.classList.toggle('active', isActive);
                    tab.setAttribute('aria-selected', isActive ? 'true' : 'false');
                    tab.setAttribute('tabindex', isActive ? '0' : '-1');
                });

                // Calculate platform statistics
                const systems = [...new Set(cells.map(c => c.system))].sort();
                const benchmarks = [...new Set(cells.map(c => c.benchmark))].sort();
                const allOsBuilds = [...new Set(cells.flatMap(c => c.os_builds))];
                const totalTests = cells.reduce((sum, c) => sum + c.build_count, 0);
                const viableCells = cells.filter(c => c.viable);
                const coverageScore = cells.length > 0
                    ? Math.round((viableCells.length / cells.length) * 100)
                    : 0;

                // Display platform summary safely
                const summaryContainer = document.getElementById('platformSummary');
                summaryContainer.textContent = ''; // Clear existing content

                const summaryDiv = document.createElement('div');
                summaryDiv.className = 'summary';

                const platformMetrics = [
                    { value: systems.length, label: 'Systems' },
                    { value: allOsBuilds.length, label: 'OS Builds' },
                    { value: totalTests, label: 'Total Tests' },
                    { value: coverageScore + '%', label: 'Coverage Score' }
                ];

                platformMetrics.forEach(({ value, label }) => {
                    const metricDiv = document.createElement('div');
                    metricDiv.className = 'metric';

                    const valueDiv = document.createElement('div');
                    valueDiv.className = 'metric-value';
                    valueDiv.textContent = value;

                    const labelDiv = document.createElement('div');
                    labelDiv.className = 'metric-label';
                    labelDiv.textContent = label;

                    metricDiv.appendChild(valueDiv);
                    metricDiv.appendChild(labelDiv);
                    summaryDiv.appendChild(metricDiv);
                });

                summaryContainer.appendChild(summaryDiv);
                summaryContainer.style.display = 'block';

                // Build z-values (build counts) and colors
                const z = [];
                const colors = [];
                const hovertext = [];

                benchmarks.forEach(bench => {
                    const row = [];
                    const colorRow = [];
                    const hoverRow = [];

                    systems.forEach(sys => {
                        const cell = cells.find(c => c.system === sys && c.benchmark === bench);
                        if (cell) {
                            row.push(cell.build_count);
                            colorRow.push(cell.color);
                            hoverRow.push(
                                `<b>${sys}</b><br>` +
                                `<b>${bench}</b><br>` +
                                `OS Builds: ${cell.build_count}<br>` +
                                `Versions: ${cell.os_builds.join(', ')}<br>` +
                                `CPU: ${cell.cpu_info}<br>` +
                                `Arch: ${cell.architecture}<br>` +
                                `Viable: ${cell.viable ? 'Yes' : 'No'}`
                            );
                        } else {
                            row.push(0);
                            colorRow.push('#E0E0E0');
                            hoverRow.push('No data');
                        }
                    });

                    z.push(row);
                    colors.push(colorRow);
                    hovertext.push(hoverRow);
                });

                // Create custom colorscale based on our color codes
                const trace = {
                    z: z,
                    x: systems,
                    y: benchmarks,
                    type: 'heatmap',
                    colorscale: [
                        [0, '#E0E0E0'],
                        [0.2, '#FFF59D'],
                        [0.4, '#A5D6A7'],
                        [0.7, '#66BB6A'],
                        [1, '#2E7D32']
                    ],
                    hovertext: hovertext,
                    hoverinfo: 'text',
                    showscale: true,
                    colorbar: {
                        title: 'OS Builds',
                        thickness: 15,
                        len: 0.5
                    }
                };

                const layout = {
                    title: `${platform} Coverage Matrix`,
                    xaxis: {
                        title: 'System / Instance Type',
                        tickangle: -45,
                        automargin: true
                    },
                    yaxis: {
                        title: 'Benchmark',
                        automargin: true
                    },
                    height: Math.max(500, benchmarks.length * 25 + 150),
                    margin: { l: 150, r: 100, t: 80, b: 200 },
                    plot_bgcolor: '#f8f9fa',
                    paper_bgcolor: 'white'
                };

                const config = {
                    responsive: true,
                    displayModeBar: true,
                    displaylogo: false,
                    modeBarButtonsToRemove: ['lasso2d', 'select2d']
                };

                // Clear loading spinner before rendering
                const heatmapElement = document.getElementById('heatmap');
                heatmapElement.textContent = '';
                heatmapElement.setAttribute('aria-label', `Coverage heatmap for ${platform}`);
                Plotly.newPlot('heatmap', [trace], layout, config);
            }

            setLoadingMessage(elementId, message) {
                const element = document.getElementById(elementId);
                element.textContent = '';
                const loadingDiv = document.createElement('div');
                loadingDiv.className = 'loading';
                loadingDiv.textContent = message;
                element.appendChild(loadingDiv);
            }

            updateFilterStatus() {
                const platformCount = Object.keys(this.data).length;
                const totalCells = Object.values(this.data).reduce((sum, cells) => sum + cells.length, 0);

                const activeFilters = [];
                if (this.filters.benchmark) activeFilters.push(this.filters.benchmark);
                if (this.filters.architecture) activeFilters.push(this.filters.architecture);
                if (this.filters.min_builds && this.filters.min_builds > 0) {
                    activeFilters.push(`${this.filters.min_builds}+ builds`);
                }

                let status;
                if (activeFilters.length === 0) {
                    status = `Showing all platforms (${platformCount} platforms, ${totalCells} benchmark coverage cells)`;
                } else {
                    status = `Filtered by ${activeFilters.join(', ')} (${platformCount} platforms, ${totalCells} benchmark coverage cells)`;
                }

                document.getElementById('filterStatus').textContent = status;
            }

            renderExecutiveSummary(summaryData) {
                const container = document.getElementById('summaryInsights');
                container.textContent = ''; // Clear loading state

                // Critical Gaps Section
                const gapsSection = document.createElement('div');
                gapsSection.className = 'insight-section';

                const gapsHeader = document.createElement('h3');
                gapsHeader.textContent = 'Critical Coverage Gaps';
                gapsSection.appendChild(gapsHeader);

                if (summaryData.critical_gaps && summaryData.critical_gaps.length > 0) {
                    summaryData.critical_gaps.forEach(gap => {
                        const gapItem = document.createElement('div');
                        gapItem.className = 'insight-item critical-gap';
                        gapItem.textContent = `${gap}: No viable test coverage (need 2+ OS builds for regression detection)`;
                        gapsSection.appendChild(gapItem);
                    });
                } else {
                    const noGaps = document.createElement('div');
                    noGaps.className = 'no-issues';
                    noGaps.textContent = 'No critical gaps - all platforms have viable coverage';
                    gapsSection.appendChild(noGaps);
                }

                container.appendChild(gapsSection);

                // Recommendations Section
                const recsSection = document.createElement('div');
                recsSection.className = 'insight-section';

                const recsHeader = document.createElement('h3');
                recsHeader.textContent = 'Recommended Systems';
                recsSection.appendChild(recsHeader);

                if (summaryData.recommended_systems && summaryData.recommended_systems.length > 0) {
                    const recsDesc = document.createElement('p');
                    recsDesc.style.marginBottom = '10px';
                    recsDesc.style.fontSize = '14px';
                    recsDesc.style.color = '#6c757d';
                    recsDesc.textContent = 'These systems have the best test coverage across multiple benchmarks:';
                    recsSection.appendChild(recsDesc);

                    summaryData.recommended_systems.forEach(([systemName, stats]) => {
                        const recItem = document.createElement('div');
                        recItem.className = 'insight-item recommendation';

                        // Line 1: System name (bold, larger)
                        const systemNameDiv = document.createElement('div');
                        systemNameDiv.style.fontWeight = 'bold';
                        systemNameDiv.style.fontSize = '15px';
                        systemNameDiv.style.marginBottom = '4px';
                        systemNameDiv.textContent = systemName;
                        recItem.appendChild(systemNameDiv);

                        // Line 2: Platform • CPU • Cores • Architecture (smaller, gray)
                        const metadataDiv = document.createElement('div');
                        metadataDiv.style.fontSize = '13px';
                        metadataDiv.style.color = '#6c757d';
                        metadataDiv.style.marginBottom = '4px';

                        // Simplify CPU model for display
                        let cpuDisplay = stats.cpu_model;
                        const isTruncated = cpuDisplay.length > 40;
                        if (isTruncated) {
                            cpuDisplay = cpuDisplay.substring(0, 37) + '...';
                        }

                        const metadataText = `${stats.platform} • ${cpuDisplay} • ${stats.cores} cores • ${stats.arch}`;
                        metadataDiv.textContent = metadataText;

                        // Add tooltip with full CPU model if truncated
                        if (isTruncated) {
                            metadataDiv.title = `${stats.platform} • ${stats.cpu_model} • ${stats.cores} cores • ${stats.arch}`;
                            metadataDiv.style.cursor = 'help';
                        }

                        recItem.appendChild(metadataDiv);

                        // Line 3: Coverage stats
                        const coverageDiv = document.createElement('div');
                        coverageDiv.style.fontSize = '13px';
                        coverageDiv.style.color = '#495057';
                        const benchmarkCount = Array.isArray(stats.benchmarks) ? stats.benchmarks.length : 0;
                        coverageDiv.textContent = `${stats.viable} viable tests across ${benchmarkCount} benchmarks`;
                        recItem.appendChild(coverageDiv);

                        recsSection.appendChild(recItem);
                    });
                } else {
                    const noRecs = document.createElement('div');
                    noRecs.className = 'no-issues';
                    noRecs.textContent = 'Insufficient data for recommendations';
                    recsSection.appendChild(noRecs);
                }

                container.appendChild(recsSection);
            }

            setupEventListeners() {
                document.getElementById('benchmarkFilter').addEventListener('change', e => {
                    this.filters.benchmark = e.target.value;
                    this.loadCoverage();
                });

                document.getElementById('archFilter').addEventListener('change', e => {
                    this.filters.architecture = e.target.value;
                    this.loadCoverage();
                });

                document.getElementById('minBuilds').addEventListener('change', e => {
                    this.filters.min_builds = e.target.value;
                    this.loadCoverage();
                });
            }

            async refresh() {
                const btn = document.getElementById('refreshBtn');
                btn.disabled = true;
                btn.textContent = '🔄 Refreshing...';

                try {
                    await fetch('/api/refresh', { method: 'POST' });
                    await this.loadSummary();
                    await this.loadCoverage();
                    this.clearError();
                } catch (error) {
                    this.showError('Failed to refresh: ' + error.message);
                } finally {
                    btn.disabled = false;
                    btn.textContent = '🔄 Refresh Data';
                }
            }
        }

        // Initialize app on page load
        const app = new HeatSeekApp();
        document.addEventListener('DOMContentLoaded', () => app.init());
    </script>
</body>
</html>
